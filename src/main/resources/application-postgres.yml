spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/notes}
    username: ${DB_USERNAME:notes}
    password: ${DB_PASSWORD:notes}
    driver-class-name: org.postgresql.Driver
  h2:
    console:
      enabled: false
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
