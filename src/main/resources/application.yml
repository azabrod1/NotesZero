spring:
  application:
    name: notes
  datasource:
    url: jdbc:h2:mem:notes;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

server:
  port: ${PORT:8080}

notes:
  ai:
    provider: mock
    notebook-routing-high-risk-threshold: 0.72
    route-auto-apply-threshold: 0.62
    monthly-budget-gbp: 50.0
    triage-model: ${NOTES_AI_TRIAGE_MODEL:gpt-5.4-nano}
    router-model: ${NOTES_AI_ROUTER_MODEL:gpt-5.4-mini}
    planner-model: ${NOTES_AI_PLANNER_MODEL:gpt-5.4-mini}
    summary-model: ${NOTES_AI_SUMMARY_MODEL:gpt-5.4-mini}
    router-prompt-id: ${NOTES_AI_ROUTER_PROMPT_ID:}
    planner-prompt-id: ${NOTES_AI_PLANNER_PROMPT_ID:}
    summary-prompt-id: ${NOTES_AI_SUMMARY_PROMPT_ID:}
    open-ai-base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    open-ai-api-key: ${OPENAI_API_KEY:}
    chat-commit-rate-limit-count: ${NOTES_AI_CHAT_COMMIT_RATE_LIMIT_COUNT:100}
    chat-commit-rate-limit-window-minutes: ${NOTES_AI_CHAT_COMMIT_RATE_LIMIT_WINDOW_MINUTES:30}
    retrieval-mode: ${NOTES_AI_RETRIEVAL_MODE:hybrid}
  cors:
    allowed-origin-patterns: ${NOTES_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:4173,http://127.0.0.1:4173,http://localhost:5173,http://127.0.0.1:5173,https://*.up.railway.app}
